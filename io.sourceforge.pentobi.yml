app-id: io.sourceforge.pentobi
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: pentobi
rename-icon: pentobi
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: pentobi
    buildsystem: cmake
    sources:
      - type: git
        url: https://github.com/enz/pentobi.git
        tag: v30.1
        commit: 2087ddde7cddb7ab2db25afeea06987cb905980b
        x-checker-data:
          type: git
          tag-pattern: ^(v[\d.]+)$

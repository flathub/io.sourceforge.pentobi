app-id: io.sourceforge.pentobi
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: pentobi
rename-icon: pentobi
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: pentobi
    buildsystem: cmake
    sources:
      - type: git
        url: https://github.com/enz/pentobi.git
        tag: v29.0
        commit: 2d75666d6c66abde5dfe1438b62130a796ce2168
        x-checker-data:
          type: git
          tag-pattern: ^(v[\d.]+)$
